<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora Factorial</title>

<!-- Bootstrap -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

<link
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="estilos.css">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="tarjeta text-center">

<h2 class="titulo mb-3">
Calculadora de Factorial
</h2>

<p class="descripcion">
Ingresa un número para calcular su factorial
</p>

<!-- INPUT -->

<input
type="number"
id="numero"
class="form-control campo-numero mb-3"
placeholder="Ej: 5">

<!-- BOTONES -->

<div class="d-flex gap-2">

<button
class="btn btn-calcular w-50"
onclick="calcularFactorial()">

Calcular

</button>

<button
class="btn btn-limpiar w-50"
onclick="limpiarCampo()">

Limpiar

</button>

</div>

<!-- RESULTADO -->

<div
id="resultado"
class="resultado mt-3">

Aquí aparecerá el resultado

</div>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
